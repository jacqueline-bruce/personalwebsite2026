<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/output.css"/> <!-- the output file provides the css styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playwright:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Contact</title>
    <link rel="icon" type="./img/rainbowicon.png" href="./img/rainbowicon.png">
  </head>
  <body class="font-nunito">
    <!-- Intro Section -->
    <div class="h-1/2 lg:h-screen bg-gradient-to-t from-white">
        <!-- navbar -->
        <nav class="w-full fixed top-0 bg-white">
            <div class="container mx-auto py-2 flex justify-between">
                <div class="flex items-center gap-2">
                    <img src="./img/rainbowicon.png" alt="rainbow icon" class="w-4 h-4">
                    <span class="text-sm font-bold">Jacqueline Bruce</span>  
                </div>
                <ul class="hidden md:flex space-x-10 text-gray-600 font-bold text-sm uppercase">
                    <li class="hover:text-gray-500">
                    <a href="index.html">artwork</a>
                    </li>
                    <li class="hover:text-gray-500">
                    <a href="about.html">about me</a>
                    </li>
                    <li class="hover:text-gray-500">
                    <a href="shop.html">shop</a>
                    </li>
                    <li class="hover:text-gray-500">
                    <a href="contact.html">contact</a>
                    </li>
                </ul>                  
            </div>
        </nav>
        <!-- Contact -->
        <div class="container mx-auto py-20">
            <h1 class="text-3xl font-bold text-center mb-10">Contact Me</h1>
            <p class="text-center mb-10">Feel free to reach out!</p>
            <form class="max-w-md mx-auto">
                <div class="mb-4">
                    <label for="name" class="block text-gray-700 font-bold mb-2">Name</label>
                    <input type="text" id="name" class="appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-bold mb-2">Email</label>
                    <input type="email" id="email" class="appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-gray-700 font-bold mb-2">Message</label>
                    <textarea id="message" rows="4" class="appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none"></textarea>
                </div>
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-xl focus:outline-none focus:shadow-outline">
                    Send Message
                </button>
            </form>
        </div>

    </div>
  </body>
</html>
